# Pipeline de Produção — só roda quando a Pré-Produção passou 100%.
# Push Docker -> Criar Release -> Deploy no Render -> Deploy no Supabase -> Smoke test
name: Produção

on:
  workflow_run:
    workflows: [Pré-Produção]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  push-docker:
    name: Push Docker (GHCR)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar tags e labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build e push da imagem
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  criar-release:
    name: Criar Release
    runs-on: ubuntu-latest
    needs: push-docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Criar release a partir da versão do package.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSAO="v$(node -p "require('./package.json').version")"
          if gh release view "$VERSAO" > /dev/null 2>&1; then
            echo "Release $VERSAO já existe — pulando."
          else
            gh release create "$VERSAO" \
              --target "${{ github.event.workflow_run.head_sha }}" \
              --title "Release $VERSAO" \
              --generate-notes
          fi

  deploy-render:
    name: Deploy | Render
    runs-on: ubuntu-latest
    needs: criar-release
    environment: producao
    steps:
      - name: Disparar deploy via Deploy Hook
        run: curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" > /dev/null

  deploy-supabase:
    name: Deploy | Supabase (migrations)
    runs-on: ubuntu-latest
    needs: deploy-render
    environment: producao
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validar connection string do Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        # Evita o erro confuso de socket local quando o secret não é uma URI Postgres
        # (ex.: colaram a Project URL https://... em vez da connection string).
        run: |
          case "$SUPABASE_URL" in
            postgresql://*|postgres://*) echo "Connection string OK" ;;
            *) echo "::error::SUPABASE_URL deve ser a connection string do Postgres (postgresql://...), use o Session pooler do Supabase — não a Project URL"; exit 1 ;;
          esac

      - name: Executar migrations SQL em ordem
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        # Migrations devem ser idempotentes (IF NOT EXISTS)
        run: |
          for arquivo in database/*.sql; do
            echo "Aplicando $arquivo..."
            psql "$SUPABASE_URL" -v ON_ERROR_STOP=1 -f "$arquivo"
          done

  smoke-test:
    name: Smoke test | Produção
    runs-on: ubuntu-latest
    needs: deploy-supabase
    steps:
      - name: Aguardar deploy e checar /saude
        # URL pública do Render; sobrescrevível pela variável de repo RENDER_APP_URL.
        env:
          APP_URL: ${{ vars.RENDER_APP_URL }}
        run: |
          echo "Aguardando propagação do deploy no Render..."
          sleep 30
          for i in $(seq 1 20); do
            code=$(curl -s -o resposta.json -w '%{http_code}' --max-time 30 "$APP_URL/saude" || echo 000)
            echo "tentativa $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Health OK: $(cat resposta.json)"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Smoke test falhou — $APP_URL/saude nao respondeu 200"
          exit 1
